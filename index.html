<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<div class="brand-section">

    <img src="tracktasklogo.png" class="brand-logo">

    <div>
        <h1>TRACKTASK</h1>
        
    </div>

</div>


    <style>
    











        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #2C3E50;
            --color-secondary: #34495E;
            --color-accent: #3498DB;
            --color-accent-light: #5DADE2;
            --color-success: #27AE60;
            --color-danger: #E74C3C;
            --color-light: #ECF0F1;
            --color-lighter: #F8F9FA;
            --color-border: #BDC3C7;
            --color-text: #2C3E50;
            --color-text-muted: #7F8C8D;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .brand-section{
    position: absolute;
    top:3px;
    left:1px;
    
    display:flex;
    align-items:center;
    

    color:white;
}

.brand-logo{
    width:150px;
    height: 150px;
    
}

.brand-section h1{
    margin:0;
    font-size:40px;
}

.brand-section p{
    margin-top:5px;
    font-size:16px;
    opacity:0.9;
}
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-top: 70px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--color-light);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .input-group button {
            padding: 12px 28px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-group button:hover {
            background: var(--color-accent-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .input-group button:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--color-light);
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .tasks-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--color-lighter);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            background: var(--color-light);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-muted);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--color-success);
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            font-size: 15px;
            color: var(--color-text);
            word-break: break-word;
        }

        .task-timestamp {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        .task-delete {
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .task-delete:hover {
            color: var(--color-danger);
            background: rgba(231, 76, 60, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 18px;
            color: var(--color-text);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .footer {
            padding: 20px 30px;
            text-align: center;
            background: var(--color-lighter);
            font-size: 12px;
            color: var(--color-text-muted);
        }

        /* Scrollbar styling */
        .tasks-container::-webkit-scrollbar {
            width: 6px;
        }

        .tasks-container::-webkit-scrollbar-track {
            background: var(--color-lighter);
        }

        .tasks-container::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        .tasks-container::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-muted);
        }

        @media (max-width: 600px) {
    .container {
        border-radius: 8px;
    }

    .header {
        padding: 30px 20px;
    }

    .header h1 {
        font-size: 24px;
    }

    .content {
        padding: 20px;
    }

    .input-group {
        flex-direction: column;
    }

    .input-group button {
        width: 100%;
    }

    .stats {
        gap: 10px;
    }

    .stat-number {
        font-size: 24px;
    }
}    
    </style>
</head>
<body>
    <div class="container">
       

        <div class="content">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button onclick="addTask()">Add</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="remainingTasks">0</div>
                    <div class="stat-label">Remaining</div>
                </div>
            </div>

            <div class="tasks-container" id="tasksList"></div>

            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">📝</div>
                <h2>No tasks yet</h2>
                <p>Add a task above to get started</p>
            </div>
        </div>

        <div class="footer">
            <p>TRACKTASK © 2026</p>
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const tasksList = document.getElementById('tasksList');
        const emptyState = document.getElementById('emptyState');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');
        const remainingTasksEl = document.getElementById('remainingTasks');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function formatTime(isoString) {
            if (!isoString) return 'Just now';
            
            const taskDate = new Date(isoString);
            const now = new Date();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            taskDate.setHours(0, 0, 0, 0);
            
            let dateStr = '';
            if (taskDate.getTime() === today.getTime()) {
                dateStr = 'Today';
            } else if (taskDate.getTime() === yesterday.getTime()) {
                dateStr = 'Yesterday';
            } else {
                const options = { month: 'short', day: 'numeric' };
                dateStr = taskDate.toLocaleDateString('en-US', options);
            }
            
            const taskDateFull = new Date(isoString);
            const timeStr = taskDateFull.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            return `${dateStr} at ${timeStr}`;
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            tasksList.innerHTML = '';
            
            if (tasks.length === 0) {
                emptyState.style.display = 'block';
                updateStats();
                return;
            }

            emptyState.style.display = 'none';

            tasks.forEach((task, index) => {
                const taskEl = document.createElement('div');
                taskEl.className = `task-item ${task.completed ? 'completed' : ''}`;
                const formattedTime = formatTime(task.timestamp);
                taskEl.innerHTML = `
                    <input 
                        type="checkbox" 
                        class="task-checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${index})"
                    >
                    <div style="flex: 1;">
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <div class="task-timestamp">${formattedTime}</div>
                    </div>
                    <button class="task-delete" onclick="deleteTask(${index})">✕</button>
                `;
                tasksList.appendChild(taskEl);
            });

            updateStats();
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            tasks.push({ text, completed: false, timestamp: new Date().toISOString() });
            taskInput.value = '';
            saveTasks();
            renderTasks();
            taskInput.focus();
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const remaining = total - completed;

            totalTasksEl.textContent = total;
            completedTasksEl.textContent = completed;
            remainingTasksEl.textContent = remaining;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Initial render
        renderTasks();
    </script>
</body>
</html>
